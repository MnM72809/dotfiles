# WIKI:
# https://wiki.hypr.land/Configuring/
# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
#$fileManager = thunar
#$fileManager = dolphin
$fileManager = nautilus
#$menu = rofi -show drun
#$menu = wofi --show drun
#$menu = anyrun
#$menu = ~/.config/rofi/launchers/type-1/launcher.sh
$menu = rofi -show drun
$runmenu = rofi -show run
$browser = zen-browser
$hyprlock = hyprlock -c /home/moriaan/.config/hypr/hyprlock.conf --grace 1
# reload waybar; reload kitty configuration
$reload = ~/.config/waybar/scripts/launch.sh; killall -SIGUSR1 kitty; killall swayosd-server; hyprctl dispatch exec swayosd-server; makoctl reload



# Link other conf files
source = colors.conf

source = ./hyprland/monitors.conf
source = ./hyprland/autostart.conf
source = ./hyprland/envvars.conf
source = ./hyprland/looknfeel.conf
source = ./hyprland/input.conf
source = ./hyprland/keybinds.conf
source = ./hyprland/windows.conf
source = ./hyprland/workspaces.conf


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, ask
permission = /usr/(bin|local/bin)/hyprctl, plugin, ask
permission = /usr/(bin|local/bin)/hyprlock, screencopy, allow

# Only enable when needed, causes performance hit
#debug:disable_logs = false

misc {
	disable_hyprland_logo = true
	#disable_splash_rendering = true
	#animate_mouse_windowdragging = true
	render_unfocused_fps = 30
	enable_swallow = true
}
