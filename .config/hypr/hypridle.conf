listener {
    timeout = 300                                 # 5 min
    on-timeout = $LOCK_CMD                        # Lock screen after timeout
}

listener {
    timeout = 600                                                     # 10 min
    on-timeout = hyprctl dispatch dpms off                            # Turn off screen after timeout
    on-resume = hyprctl dispatch dpms on && brightnessctl -r          # Turn on screen and restore brightness after activity
}

listener {
    timeout = 1200                                # 20 min
    on-timeout = systemctl suspend                # Suspend PC after timeout
}
