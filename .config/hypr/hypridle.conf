$LOCK_CMD = pidof hyprlock || hyprlock --grace 10 # Prevent multiple hyprlock instances
$AFTER_SLEEP_CMD = hyprctl keyword input:numlock_by_default false && hyprctl keyword input:numlock_by_default true && hyprctl dispatch dpms on; sleep 0.3; hyprctl dispatch dpms on

general {
    lock_cmd = $LOCK_CMD
    # before_sleep_cmd = loginctl lock-session   # Lock before suspend (alternative)
    before_sleep_cmd = $LOCK_CMD                # Lock before suspend
    after_sleep_cmd = $AFTER_SLEEP_CMD          # Turn on display after sleep to avoid double key press
}

