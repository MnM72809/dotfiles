# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = SF Pro Display Bold

general {
    hide_cursor = false
	ignore_empty_input = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    #path = screenshot
	path = /home/moriaan/.config/themes/wallpapers/current
    blur_passes = 0
	blur_size = 4
	brightness = 0.75
}

input-field {
    monitor =
    size = 10%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.1) # no fill

    #outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    outer_color = rgba(242, 242, 242, 0)
    #check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    check_color = rgba(255, 255, 255, 0)
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgba(242, 242, 242, 0.95)
    fade_on_empty = true
    rounding = 18

    font_family = $font
    #placeholder_text = Input password...
    placeholder_text = 
    fail_text = $PAMFAIL <b>($ATTEMPTS attempts)</b>

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    dots_size = 0.23
    dots_spacing = 0.31

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
	#hide_input = true

    position = 0, 50
    halign = center
    valign = bottom
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 92
    font_family = $font
	color = rgba(242, 242, 242, 0.8)

    position = 0, -120
    halign = center
    valign = top

    # shadow
    shadow_passes = 6        # 0 = off, 1–3 is usually enough
    shadow_size = 20          # spread / softness of the shadow
    shadow_color = rgba(0,0,0,1)
    shadow_boost = 80       # multiply opacity/intensity
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 20
    font_family = $font
	color = rgba(242, 242, 242, 0.8)

    position = 0, -250
    halign = center
    valign = top
}

