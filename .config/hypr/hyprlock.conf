label {
	monitor = 
	text = 󰤄
	font_size = 17
    font_family = $font
	color = rgba(242, 242, 242, 0.1)
	onclick = systemctl suspend

	position = 29, 25
	halign = left
	valign = bottom

	shadow_passes = 5
	shadow_size = 20
	shadow_color = rgba(0, 0, 0, 1)
}

label {
	monitor = 
	text = ⏼
	font_size = 17
    font_family = $font
	color = rgba(242, 242, 242, 0.1)
	onclick = systemctl hibernate

	position = 25, 62
	halign = left
	valign = bottom

	shadow_passes = 5
	shadow_size = 20
	shadow_color = rgba(0, 0, 0, 1)
}
