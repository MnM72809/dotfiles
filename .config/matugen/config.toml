[config]
reload_apps = true

[config.reload_apps_list]
gtk_theme = true




[templates.gtk3]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.qt5ct]
input_path = './templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = './templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'



[templates.hyprland]
input_path = './templates/hyprland.lua'
output_path = '~/.config/hypr/colors.lua'
post_hook = "hyprctl reload"

[templates.hypr-cava-visualizer]
input_path = './templates/hypr-cava-visualizer.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.waybar]
input_path = './templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.spotify]
input_path = './templates/spicetify.ini'
output_path = '~/.config/spicetify/Themes/Sleek/color.ini'
post_hook = 'if hyprctl clients | grep -q Spotify; then spicetify watch -s 2>&1 | sed "/Reloaded Spotify/q"; fi' # Spotify will still open a window if there is none due to waybar reloading (only when spotify is in tray)

[templates.rofi]
input_path = './templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.mako]
input_path = './templates/mako'
output_path = '~/.config/mako/config'
post_hook = 'makoctl reload'

[templates.prismlauncher]
input_path = './templates/prismlauncher.json'
output_path = '~/.local/share/PrismLauncher/themes/Matugen/theme.json'

[templates.wlogout]
input_path = './templates/colors.css'
output_path = '~/.config/wlogout/colors.css'



[templates.firefox-website-colors]
input_path = "./templates/firefox-colors.css"
output_path = "~/.zen/wn2hpci2.Default (release)/chrome/colors.css"


#[templates.kitty]
#input_path = './templates/kitty-colors.conf'
#output_path = '~/.config/kitty/themes/Matugen.conf'
#post_hook = "kitty +kitten themes --reload-in=all Matugen"




[templates.led_strip]
input_path  = '~/.config/matugen/templates/led_strip.sh'
output_path = '~/.cache/matugen/led_strip.sh'
post_hook   = "hyprctl dispatch 'hl.dsp.exec_cmd(\"bash ~/.cache/matugen/led_strip.sh\")'"
